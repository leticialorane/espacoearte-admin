<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espaço & Arte — Agenda</title>
  <link rel="stylesheet" href="agenda.css">
  <link rel="stylesheet" href="responsividade.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1>Espaço &<br>Arte</h1>
      <p>Painel Administrativo</p>
    </div>
    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Menu</span>
      <a href="dashboard.html" class="sidebar-nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
      <a href="clientes.html"  class="sidebar-nav-item"><i class="ti ti-users"></i> Clientes</a>
      <a href="servicos.html"              class="sidebar-nav-item"><i class="ti ti-briefcase"></i> Serviços</a>
      <a href="agenda.html"    class="sidebar-nav-item sidebar-nav-item--active"><i class="ti ti-calendar"></i> Agenda</a>
      <a href="curriculos.html"              class="sidebar-nav-item"><i class="ti ti-file-text"></i> Currículos</a>
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-footer-email">admin@espacoearte.com</span>
      <button class="sidebar-footer-logout"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </aside>

  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-mobile-agenda" id="menu-mobile-btn"><i class="ti ti-menu-2"></i></button>
        <h2>Agenda</h2>
      </div>
      <div class="topbar-right">
        <span id="topbar-date" class="topbar-date"></span>
      </div>
    </header>

    <div class="agenda-topbar">
      <div class="agenda-topbar-esq">
        <button class="agenda-nav-btn" id="btn-anterior"><i class="ti ti-chevron-left"></i></button>
        <button class="agenda-nav-btn" id="btn-proximo"><i class="ti ti-chevron-right"></i></button>
        <button class="btn-hoje" id="btn-hoje">Hoje</button>
        <span class="agenda-titulo-semana" id="agenda-titulo"></span>
      </div>
      <div class="agenda-topbar-dir">
        <div class="agenda-view-toggle">
          <button class="agenda-view-btn" data-view="dia">Dia</button>
          <button class="agenda-view-btn agenda-view-btn--active" data-view="semana">Semana</button>
          <button class="agenda-view-btn" data-view="mes">Mês</button>
          <button class="agenda-view-btn" data-view="ano">Ano</button>
        </div>
        <button class="btn-novo-evento" id="btn-novo-evento"><i class="ti ti-plus"></i> Novo Evento</button>
      </div>
    </div>

    <div class="agenda-corpo">

      <div class="agenda-sidebar">
        <div class="agenda-sidebar-header">
          <div class="agenda-sidebar-hoje" id="sb-label"></div>
          <div class="agenda-sidebar-data"  id="sb-data"></div>
          <div class="agenda-sidebar-destaque" id="sb-destaque" style="display:none;"></div>
        </div>
        <div class="agenda-sidebar-lista" id="sb-lista"></div>
      </div>

      <div class="agenda-grade">
        <div class="grade-header" id="grade-header">
          <div class="grade-header-vazio"></div>
        </div>
        <div class="grade-scroll" id="grade-scroll">
          <div class="grade-inner" id="grade-inner"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo-text">Novo Evento</span>
      <button class="modal-fechar" id="modal-fechar"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-campo">
      <label class="modal-label">Nome do evento</label>
      <input class="modal-input" id="modal-nome" type="text" placeholder="Ex: Reunião com cliente">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="modal-campo">
        <label class="modal-label">Data</label>
        <input class="modal-input" id="modal-data" type="date">
      </div>
      <div class="modal-campo">
        <label class="modal-label">Horário</label>
        <input class="modal-input" id="modal-hora" type="time" value="09:00">
      </div>
    </div>
    <div class="modal-campo">
      <label class="modal-label">Duração (minutos)</label>
      <input class="modal-input" id="modal-duracao" type="number" value="60" min="15" step="15">
    </div>
    <div class="modal-campo">
      <label class="modal-label">Cor</label>
      <div class="modal-cores" id="modal-cores">
        <div class="modal-cor selecionada" data-cor="verde"   style="background:#eaf3de;border:2px solid #4a7c35;"></div>
        <div class="modal-cor" data-cor="azul"    style="background:#e6f1fb;border:2px solid #185fa5;"></div>
        <div class="modal-cor" data-cor="amarelo" style="background:#faeeda;border:2px solid #854f0b;"></div>
        <div class="modal-cor" data-cor="teal"    style="background:#e1f5ee;border:2px solid #0f6e56;"></div>
        <div class="modal-cor" data-cor="rosa"    style="background:#fce8f3;border:2px solid #8b3a62;"></div>
      </div>
    </div>
    <div class="modal-acoes">
      <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
      <button class="btn-salvar"   id="btn-salvar">Salvar evento</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTES ──────────────────────────────────────────────────────────────
const DIAS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const HORAS = Array.from({length:14}, (_,i) => i + 7);
const ALT   = 64;
const CORES_HEX = { verde:'#4a7c35', azul:'#185fa5', amarelo:'#854f0b', teal:'#0f6e56', rosa:'#8b3a62' };

// ── ESTADO ──────────────────────────────────────────────────────────────────
const hoje   = new Date();
let viewAtual   = 'semana';
let semanaBase  = getSegunda(hoje);
let diaBase     = new Date(hoje);
let editandoId  = null;
let corSel      = 'verde';

let eventos = [
  { id:1, nome:'Visita ao cliente — Alpha Ltda',   data:'2026-06-08', hora:'09:00', duracao:60,  cor:'verde' },
  { id:2, nome:'Reunião de briefing',              data:'2026-06-09', hora:'10:00', duracao:90,  cor:'azul' },
  { id:3, nome:'Revisão de maquete',               data:'2026-06-09', hora:'14:00', duracao:60,  cor:'teal' },
  { id:4, nome:'Aprovação de projeto',             data:'2026-06-10', hora:'11:00', duracao:60,  cor:'amarelo' },
  { id:5, nome:'Apresentação Galeria Moderna',     data:'2026-06-11', hora:'09:30', duracao:120, cor:'teal' },
  { id:6, nome:'Entrega de maquete',               data:'2026-06-11', hora:'16:00', duracao:60,  cor:'rosa' },
  { id:7, nome:'Revisão de contrato',              data:'2026-06-12', hora:'11:00', duracao:60,  cor:'azul' },
  { id:8, nome:'Workshop interno',                 data:'2026-06-13', hora:'09:00', duracao:180, cor:'verde' },
  { id:9, nome:'Reunião com Instituto Cultural',   data:'2026-06-13', hora:'14:00', duracao:60,  cor:'amarelo' },
];

// ── UTILS ───────────────────────────────────────────────────────────────────
function getSegunda(d) {
  const r = new Date(d);
  const dow = r.getDay();
  r.setDate(r.getDate() - (dow === 0 ? 6 : dow - 1));
  r.setHours(0,0,0,0);
  return r;
}
function addDias(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function iso(d)      { return d.toISOString().slice(0,10); }
function hhmm(s)     { const [h,m]=s.split(':').map(Number); return h*60+m; }
function fimHora(hora,min){ const t=hhmm(hora)+min; return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`; }

// ── TOPBAR DATE ─────────────────────────────────────────────────────────────
document.getElementById('topbar-date').textContent =
  hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

// ── RENDER PRINCIPAL ────────────────────────────────────────────────────────
function render() {
  const titulo = document.getElementById('agenda-titulo');
  const gradeHeader = document.getElementById('grade-header');
  const gradeInner  = document.getElementById('grade-inner');
  const gradeScroll = document.getElementById('grade-scroll');

  if (viewAtual === 'semana' || viewAtual === 'dia') {
    // mostra grade
    gradeHeader.style.display = '';
    gradeInner.style.display  = '';

    const dias = viewAtual === 'semana'
      ? Array.from({length:7}, (_,i) => addDias(semanaBase, i))
      : [diaBase];

    // título
    if (viewAtual === 'semana') {
      const ini=dias[0], fim=dias[6];
      const mI=MESES[ini.getMonth()], mF=MESES[fim.getMonth()];
      titulo.textContent = mI===mF ? `${mI} ${ini.getFullYear()}` : `${mI} — ${mF} ${fim.getFullYear()}`;
    } else {
      titulo.textContent = diaBase.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    }

    renderGrade(dias);
    renderSidebar(dias);

  } else if (viewAtual === 'mes') {
    titulo.textContent = `${MESES[diaBase.getMonth()]} ${diaBase.getFullYear()}`;
    gradeHeader.innerHTML = '<div class="grade-header-vazio"></div>';
    gradeHeader.style.gridTemplateColumns = '';
    gradeInner.innerHTML = '';
    renderMes(gradeScroll);
    renderSidebar(Array.from({length:7},(_,i)=>addDias(semanaBase,i)));

  } else if (viewAtual === 'ano') {
    titulo.textContent = String(diaBase.getFullYear());
    gradeHeader.innerHTML = '<div class="grade-header-vazio"></div>';
    gradeHeader.style.gridTemplateColumns = '';
    gradeInner.innerHTML = '';
    renderAno(gradeScroll);
    renderSidebar(Array.from({length:7},(_,i)=>addDias(semanaBase,i)));
  }
}

// ── GRADE (DIA / SEMANA) ────────────────────────────────────────────────────
function renderGrade(dias) {
  const header = document.getElementById('grade-header');
  const inner  = document.getElementById('grade-inner');
  const cols   = dias.length;

  header.style.gridTemplateColumns = `56px repeat(${cols}, 1fr)`;
  header.innerHTML = '<div class="grade-header-vazio"></div>';
  inner.innerHTML  = '';
  inner.style.gridTemplateColumns = `56px repeat(${cols}, 1fr)`;

  // cabeçalho
  dias.forEach(d => {
    const isH = iso(d)===iso(hoje);
    const col = document.createElement('div');
    col.className = 'grade-dia-col'+(isH?' grade-dia-col--hoje':'');
    col.innerHTML = `<div class="grade-dia-nome">${DIAS[d.getDay()]}</div><div class="grade-dia-num">${d.getDate()}</div>`;
    col.addEventListener('click', ()=>abrirModal(iso(d)));
    header.appendChild(col);
  });

  // horas
  const colH = document.createElement('div');
  colH.className = 'grade-horas';
  HORAS.forEach(h => {
    const el = document.createElement('div');
    el.className = 'grade-hora';
    el.textContent = `${h}h`;
    colH.appendChild(el);
  });
  inner.appendChild(colH);

  // colunas
  dias.forEach(d => {
    const isH = iso(d)===iso(hoje);
    const col = document.createElement('div');
    col.className = 'grade-col'+(isH?' grade-col--hoje':'');
    col.dataset.data = iso(d);
    HORAS.forEach(()=>{ const s=document.createElement('div'); s.className='grade-slot'; col.appendChild(s); });

    // linha atual
    if (isH) {
      const agora=new Date();
      const min=agora.getHours()*60+agora.getMinutes();
      const topo=((min-7*60)/60)*ALT;
      if(topo>=0){ const ln=document.createElement('div'); ln.className='linha-atual'; ln.style.top=`${topo}px`; col.appendChild(ln); }
    }

    eventos.filter(e=>e.data===iso(d)).forEach(ev=>plotarEvento(ev,col));
    col.addEventListener('click', e=>{ if(!e.target.closest('.evento')) abrirModal(col.dataset.data); });
    inner.appendChild(col);
  });

  document.getElementById('grade-scroll').scrollTop = ALT; // scroll para 8h
}

function plotarEvento(ev, col) {
  const inicio = hhmm(ev.hora);
  const topo   = ((inicio - 7*60)/60)*ALT;
  if (topo < 0) return;
  const el = document.createElement('div');
  el.className = `evento evento--${ev.cor}`;
  el.style.top    = `${topo}px`;
  el.style.height = `${(ev.duracao/60)*ALT - 4}px`;
  el.innerHTML = `<span class="evento-hora">${ev.hora}</span><span class="evento-nome">${ev.nome}</span>`;
  el.addEventListener('click', e=>{ e.stopPropagation(); abrirModalEditar(ev); });
  col.appendChild(el);
}

// ── VIEW MÊS ────────────────────────────────────────────────────────────────
function renderMes(scroll) {
  scroll.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'padding:12px;';

  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);';

  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{
    const el=document.createElement('div');
    el.style.cssText='text-align:center;font-size:10px;font-weight:600;color:var(--texto-mudo);text-transform:uppercase;padding:6px 0 10px;';
    el.textContent=d; grid.appendChild(el);
  });

  const prim = new Date(diaBase.getFullYear(), diaBase.getMonth(), 1);
  const ini  = new Date(prim); ini.setDate(ini.getDate()-prim.getDay());

  for (let i=0; i<42; i++) {
    const d=new Date(ini); d.setDate(d.getDate()+i);
    const outro = d.getMonth()!==diaBase.getMonth();
    const isH   = iso(d)===iso(hoje);
    const evs   = eventos.filter(e=>e.data===iso(d));

    const cell=document.createElement('div');
    cell.style.cssText=`min-height:90px;border:1px solid var(--creme-borda);padding:6px;cursor:pointer;
      background:${isH?'rgba(74,124,53,.04)':'transparent'};opacity:${outro?'.4':'1'};transition:background .15s;`;
    cell.addEventListener('click',()=>abrirModal(iso(d)));
    cell.addEventListener('mouseover',()=>cell.style.background='var(--creme-suave)');
    cell.addEventListener('mouseout', ()=>cell.style.background=isH?'rgba(74,124,53,.04)':'transparent');

    const num=document.createElement('div');
    num.style.cssText=`font-size:12px;font-weight:${isH?700:400};margin-bottom:4px;
      color:${isH?'white':'var(--texto-principal)'};
      background:${isH?'var(--verde-medio)':'transparent'};
      width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;`;
    num.textContent=d.getDate(); cell.appendChild(num);

    evs.slice(0,2).forEach(ev=>{
      const tag=document.createElement('div');
      tag.style.cssText=`font-size:10px;font-weight:500;padding:2px 5px;border-radius:4px;margin-bottom:2px;
        background:var(--ev-${ev.cor}-bg,#eee);color:var(--ev-${ev.cor},#333);
        overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;`;
      tag.textContent=ev.nome;
      tag.addEventListener('click',e=>{e.stopPropagation();abrirModalEditar(ev);});
      cell.appendChild(tag);
    });
    if(evs.length>2){ const m=document.createElement('div'); m.style.cssText='font-size:10px;color:var(--texto-mudo);padding:2px 5px;'; m.textContent=`+${evs.length-2} mais`; cell.appendChild(m); }

    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  scroll.appendChild(wrap);
}

// ── VIEW ANO ────────────────────────────────────────────────────────────────
function renderAno(scroll) {
  scroll.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px;';

  for (let m=0; m<12; m++) {
    const card=document.createElement('div');
    card.style.cssText='background:var(--branco);border:0.5px solid var(--creme-borda);border-radius:12px;padding:14px;';

    const titulo=document.createElement('div');
    titulo.style.cssText='font-size:12px;font-weight:600;color:var(--texto-principal);margin-bottom:10px;';
    titulo.textContent=MESES[m]; card.appendChild(titulo);

    const miniGrid=document.createElement('div');
    miniGrid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:1px;';

    ['D','S','T','Q','Q','S','S'].forEach(l=>{
      const lbl=document.createElement('div');
      lbl.style.cssText='font-size:8px;text-align:center;color:var(--texto-mudo);font-weight:600;padding-bottom:4px;';
      lbl.textContent=l; miniGrid.appendChild(lbl);
    });

    const prim=new Date(diaBase.getFullYear(),m,1);
    const ini=new Date(prim); ini.setDate(ini.getDate()-prim.getDay());

    for (let i=0; i<35; i++) {
      const d=new Date(ini); d.setDate(d.getDate()+i);
      const outro=d.getMonth()!==m;
      const isH=iso(d)===iso(hoje);
      const temEv=eventos.some(e=>e.data===iso(d));

      const cel=document.createElement('div');
      cel.style.cssText=`font-size:9px;text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;
        color:${isH?'white':outro?'var(--texto-mudo)':'var(--texto-principal)'};
        background:${isH?'var(--verde-medio)':temEv?'var(--verde-palido)':'transparent'};
        opacity:${outro?.35:1};`;
      cel.textContent=d.getDate();
      cel.addEventListener('click',()=>{
        diaBase=new Date(d); viewAtual='dia';
        document.querySelectorAll('.agenda-view-btn').forEach(b=>b.classList.remove('agenda-view-btn--active'));
        document.querySelector('[data-view="dia"]').classList.add('agenda-view-btn--active');
        render();
      });
      miniGrid.appendChild(cel);
    }
    card.appendChild(miniGrid);
    wrap.appendChild(card);
  }
  scroll.appendChild(wrap);
}

// ── SIDEBAR DE EVENTOS ──────────────────────────────────────────────────────
function renderSidebar(dias) {
  document.getElementById('sb-label').textContent = 'HOJE ' + hoje.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('sb-data').textContent  = hoje.toLocaleDateString('pt-BR',{weekday:'long'});

  const evHoje = eventos.filter(e=>e.data===iso(hoje));
  const dest   = document.getElementById('sb-destaque');
  if (evHoje.length) { dest.style.display='block'; dest.textContent=evHoje[0].nome; }
  else dest.style.display='none';

  const lista = document.getElementById('sb-lista');
  lista.innerHTML = '';

  dias.forEach(d=>{
    const evs = eventos.filter(e=>e.data===iso(d)).sort((a,b)=>a.hora.localeCompare(b.hora));
    if (!evs.length) return;

    const grupo=document.createElement('div');
    grupo.className='agenda-sidebar-grupo';

    const lbl=document.createElement('div');
    lbl.className='agenda-sidebar-dia-label';
    lbl.textContent=(iso(d)===iso(hoje)?'HOJE ':'')+DIAS[d.getDay()].toUpperCase()+' '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    grupo.appendChild(lbl);

    evs.forEach(ev=>{
      const item=document.createElement('div');
      item.className='agenda-sidebar-item';
      item.innerHTML=`<div class="agenda-sidebar-dot" style="background:${CORES_HEX[ev.cor]}"></div>
        <div><div class="agenda-sidebar-ev-nome">${ev.nome}</div>
        <div class="agenda-sidebar-ev-hora">${ev.hora} — ${fimHora(ev.hora,ev.duracao)}</div></div>`;
      item.addEventListener('click',()=>abrirModalEditar(ev));
      grupo.appendChild(item);
    });

    lista.appendChild(grupo);
  });

  if (!lista.children.length) {
    lista.innerHTML='<p style="font-size:11px;color:var(--texto-mudo);padding:12px 16px;">Nenhum evento.</p>';
  }
}

// ── NAVEGAÇÃO ───────────────────────────────────────────────────────────────
document.getElementById('btn-anterior').addEventListener('click',()=>{
  if(viewAtual==='semana') semanaBase=addDias(semanaBase,-7);
  else if(viewAtual==='dia') diaBase=addDias(diaBase,-1);
  else if(viewAtual==='mes') diaBase.setMonth(diaBase.getMonth()-1);
  else if(viewAtual==='ano') diaBase.setFullYear(diaBase.getFullYear()-1);
  render();
});

document.getElementById('btn-proximo').addEventListener('click',()=>{
  if(viewAtual==='semana') semanaBase=addDias(semanaBase,7);
  else if(viewAtual==='dia') diaBase=addDias(diaBase,1);
  else if(viewAtual==='mes') diaBase.setMonth(diaBase.getMonth()+1);
  else if(viewAtual==='ano') diaBase.setFullYear(diaBase.getFullYear()+1);
  render();
});

document.getElementById('btn-hoje').addEventListener('click',()=>{
  diaBase=new Date(hoje); semanaBase=getSegunda(hoje); render();
});

document.querySelectorAll('.agenda-view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.agenda-view-btn').forEach(b=>b.classList.remove('agenda-view-btn--active'));
    btn.classList.add('agenda-view-btn--active');
    viewAtual = btn.dataset.view;
    render();
  });
});

// ── MODAL ───────────────────────────────────────────────────────────────────
function abrirModal(dataISO) {
  editandoId=null;
  document.getElementById('modal-titulo-text').textContent='Novo Evento';
  document.getElementById('modal-nome').value='';
  document.getElementById('modal-data').value=dataISO||iso(hoje);
  document.getElementById('modal-hora').value='09:00';
  document.getElementById('modal-duracao').value='60';
  selecionarCor('verde');
  document.getElementById('modal-overlay').classList.add('active');
}

function abrirModalEditar(ev) {
  editandoId=ev.id;
  document.getElementById('modal-titulo-text').textContent='Editar Evento';
  document.getElementById('modal-nome').value=ev.nome;
  document.getElementById('modal-data').value=ev.data;
  document.getElementById('modal-hora').value=ev.hora;
  document.getElementById('modal-duracao').value=ev.duracao;
  selecionarCor(ev.cor);
  document.getElementById('modal-overlay').classList.add('active');
}

function selecionarCor(cor) {
  corSel=cor;
  document.querySelectorAll('.modal-cor').forEach(c=>c.classList.remove('selecionada'));
  document.querySelector(`[data-cor="${cor}"]`).classList.add('selecionada');
}

function fecharModal(){ document.getElementById('modal-overlay').classList.remove('active'); }

document.getElementById('btn-novo-evento').addEventListener('click',()=>abrirModal());
document.getElementById('modal-fechar').addEventListener('click',fecharModal);
document.getElementById('btn-cancelar').addEventListener('click',fecharModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) fecharModal(); });

document.getElementById('modal-cores').addEventListener('click',e=>{
  const cor=e.target.closest('.modal-cor'); if(cor) selecionarCor(cor.dataset.cor);
});

document.getElementById('btn-salvar').addEventListener('click',()=>{
  const nome=document.getElementById('modal-nome').value.trim();
  if(!nome){ document.getElementById('modal-nome').focus(); return; }
  const ev={ nome, data:document.getElementById('modal-data').value, hora:document.getElementById('modal-hora').value, duracao:parseInt(document.getElementById('modal-duracao').value)||60, cor:corSel };
  if(editandoId){ const i=eventos.findIndex(e=>e.id===editandoId); if(i>-1) eventos[i]={...ev,id:editandoId}; }
  else eventos.push({...ev,id:Date.now()});
  fecharModal(); render();
});

// ── MENU MOBILE ─────────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
document.getElementById('menu-mobile-btn').addEventListener('click',()=>{ sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
overlay.addEventListener('click',()=>{ sidebar.classList.remove('open'); overlay.classList.remove('active'); });

// ── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
